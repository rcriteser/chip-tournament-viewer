<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ app_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#eef5fb;
      margin:0;
      padding:32px 20px;
      color:#1c2833;
    }
    .wrap{
      max-width:900px;
      margin:0 auto;
    }
    .card{
      background:#fff;
      border-radius:16px;
      padding:24px;
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
    }
    h1{
      margin-top:0;
    }
    code{
      background:#f4f6f8;
      padding:2px 6px;
      border-radius:6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>{{ app_name }}</h1>
      <p>This is the hosted viewer service for Chip Tournament.</p>
      <p>Viewer pages will live at <code>/viewer/&lt;token&gt;</code>.</p>
      <p>Snapshot sync posts should go to <code>/api/viewer-sync/&lt;token&gt;</code>.</p>
      <p>Health check: <code>/health</code></p>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chip Tournament Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="{{ url_for('static', filename='css/viewer.css') }}">
</head>
<body>

<div class="wrap">

{% if not_found %}
  <div class="card">
    <h1>Viewer Not Found</h1>
  </div>
{% else %}

<div id="winner-banner"></div>

<div class="card">
  <h2>Tables</h2>
  <div id="tables" class="tables-grid"></div>
</div>

<div class="card">
  <h2>Queue</h2>
  <div id="queue"></div>
</div>

<div class="card">
  <h2>Players</h2>
  <div id="players" class="player-list"></div>
</div>

<script>
const token = {{ token|tojson }};
let liveState = null;

function renderTables() {
  const wrap = document.getElementById('tables');
  const tables = liveState?.tables || [];

  wrap.innerHTML = tables.map(t => `
    <div class="table-card">
      <div class="table-header">
        <div>Table ${t.table_no}</div>
        <div class="timer">${formatTime(t.elapsed_seconds || 0)}</div>
      </div>

      <div>${t.seat1?.full_name || 'Open'}</div>
      <div>${t.seat2?.full_name || 'Open'}</div>
    </div>
  `).join('');
}

function renderQueue() {
  const wrap = document.getElementById('queue');
  const queue = liveState?.queue || [];

  wrap.innerHTML = queue.map((p,i) => `
    <div class="queue-item ${i === 0 ? 'next' : ''}">
      #${p.position} - ${p.full_name}
    </div>
  `).join('');
}

function renderPlayers() {
  const wrap = document.getElementById('players');
  let players = liveState?.players || [];

  players = players.sort((a,b)=>b.current_chips - a.current_chips);

  wrap.innerHTML = players.map((p,i) => `
    <div class="player-item ${i === 0 ? 'top' : ''}">
      ${p.full_name}<br>
      ${p.current_chips} chips
    </div>
  `).join('');
}

function renderWinner(){
  const banner = document.getElementById('winner-banner');
  const winner = liveState?.winner;

  if (!winner) return;

  banner.style.display = 'block';
  banner.innerHTML = `Winner: ${winner.full_name}`;
}

function renderAll(){
  renderTables();
  renderQueue();
  renderPlayers();
  renderWinner();
}

function formatTime(seconds){
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

async function load(){
  const res = await fetch(`/api/viewer/${token}`);
  liveState = await res.json();
  renderAll();
}

load();
setInterval(load, 10000);
</script>

{% endif %}

</div>
</body>
</html>

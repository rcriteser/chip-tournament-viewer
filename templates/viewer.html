<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chip Tournament Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="{{ url_for('static', filename='css/viewer.css') }}">
</head>
<body>

<div class="wrap">

{% if not_found %}
  <div class="card">
    <h1>Viewer Not Found</h1>
  </div>
{% else %}

<div id="winner-banner"></div>

<div class="card">
  <h2>Tables</h2>
  <div id="tables" class="tables-grid"></div>
</div>

<div class="card">
  <h2>Queue</h2>
  <div id="queue"></div>
</div>

<div class="card">
  <h2>Players</h2>
  <div id="players" class="player-list"></div>
</div>

<script>
const token = {{ token|tojson }};
let liveState = null;

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function formatTime(totalSeconds) {
  totalSeconds = Math.max(0, Number(totalSeconds || 0));
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

function secondsSince(isoString) {
  if (!isoString) return 0;
  const d = new Date(isoString);
  if (Number.isNaN(d.getTime())) return 0;
  return Math.max(0, Math.floor((Date.now() - d.getTime()) / 1000));
}

function getLiveTimerSeconds(startTime, fallbackSeconds = 0) {
  if (startTime) {
    return secondsSince(startTime);
  }
  return Math.max(0, Number(fallbackSeconds || 0));
}

function updateLiveClocks() {
  document.querySelectorAll('.viewer-live-timer').forEach((el) => {
    const startTime = el.dataset.startTime || '';
    const fallbackSeconds = Number(el.dataset.elapsedSeconds || 0);
    const seconds = getLiveTimerSeconds(startTime, fallbackSeconds);
    el.textContent = formatTime(seconds);
  });
}

function renderTables() {
  const wrap = document.getElementById('tables');
  const tables = liveState?.tables || [];

  if (!tables.length) {
    wrap.innerHTML = '<div class="small">No active tables.</div>';
    return;
  }

  wrap.innerHTML = tables.map((table) => {
    const seat1 = table.seat1;
    const seat2 = table.seat2;
    const currentSeconds = getLiveTimerSeconds(
      table.match_start_time,
      Number(table.elapsed_seconds || 0)
    );

    return `
      <div class="table-card">
        <div class="table-title-row">
          <div class="table-title">Table ${Number(table.table_no || 0)}</div>
          <div
            class="timer viewer-live-timer"
            data-start-time="${escapeHtml(table.match_start_time || '')}"
            data-elapsed-seconds="${Number(table.elapsed_seconds || 0)}"
          >
            ${formatTime(currentSeconds)}
          </div>
        </div>

        <div class="pool-table-wrap">
          <img
            src="{{ url_for('static', filename='img/pool_table.png') }}"
            alt="Pool Table"
            class="pool-table-img"
          >

          <div class="viewer-seat viewer-seat-left">
            <div class="viewer-seat-name">
              ${seat1 ? escapeHtml(seat1.full_name) : 'Open'}
            </div>
            <div class="viewer-seat-chips">
              ${seat1 ? `${Number(seat1.current_chips || 0)} chips` : ''}
            </div>
            <div class="viewer-seat-meta">
              ${seat1 ? `Matches: ${Number(seat1.matches_played || 0)}` : ''}
            </div>
          </div>

          <div class="viewer-seat viewer-seat-right">
            <div class="viewer-seat-name">
              ${seat2 ? escapeHtml(seat2.full_name) : 'Open'}
            </div>
            <div class="viewer-seat-chips">
              ${seat2 ? `${Number(seat2.current_chips || 0)} chips` : ''}
            </div>
            <div class="viewer-seat-meta">
              ${seat2 ? `Matches: ${Number(seat2.matches_played || 0)}` : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderQueue() {
  const wrap = document.getElementById('queue');
  const queue = liveState?.queue || [];

  if (!queue.length) {
    wrap.innerHTML = '<div class="small">Queue is empty.</div>';
    return;
  }

  wrap.innerHTML = queue.map((p, i) => `
    <div class="queue-item ${i === 0 ? 'next' : ''}">
      <div class="queue-name">#${p.position} - ${escapeHtml(p.full_name)}</div>
      <div class="queue-meta">${Number(p.current_chips || 0)} chips · Matches: ${Number(p.matches_played || 0)}</div>
    </div>
  `).join('');
}

function renderPlayers() {
  const wrap = document.getElementById('players');
  let players = [...(liveState?.players || [])];

  if (!players.length) {
    wrap.innerHTML = '<div class="small">No players found.</div>';
    return;
  }

  players.sort((a, b) => Number(b.current_chips || 0) - Number(a.current_chips || 0));

  wrap.innerHTML = players.map((p, i) => `
    <div class="player-item ${i === 0 ? 'top' : ''}">
      <div class="player-name">${escapeHtml(p.full_name)}</div>
      <div class="player-chips">${Number(p.current_chips || 0)} chips</div>
      <div class="player-meta">Matches: ${Number(p.matches_played || 0)}</div>
    </div>
  `).join('');
}

function renderWinner() {
  const banner = document.getElementById('winner-banner');
  const winner = liveState?.winner;

  if (!winner) {
    banner.style.display = 'none';
    banner.innerHTML = '';
    return;
  }

  banner.style.display = 'block';
  banner.innerHTML = `Winner: ${escapeHtml(winner.full_name)}`;
}

function renderAll() {
  renderTables();
  renderQueue();
  renderPlayers();
  renderWinner();
}

async function load() {
  try {
    const res = await fetch(`/api/viewer/${encodeURIComponent(token)}`, { cache: 'no-store' });
    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    liveState = await res.json();
    renderAll();
  } catch (err) {
    document.getElementById('tables').innerHTML = `<div class="small">Failed to load tables: ${escapeHtml(err.message)}</div>`;
    document.getElementById('queue').innerHTML = '';
    document.getElementById('players').innerHTML = '';
  }
}

load();
setInterval(load, 5000);
setInterval(updateLiveClocks, 1000);
</script>

{% endif %}

</div>
</body>
</html>
